<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="EduAlex" />
    <meta
      name="description"
      content="Generador gratuito de Código QR para URLs"
    />
    <meta
      name="keywords"
      content="generador de código qr, generador de qr, generador de qrcode, generador de código, generador de qrcode, generador de url, url, qrcode, qr, código qr, código qrcode"
    />
    <meta name="robots" content="index, follow" />
    <link rel="icon" href="favicon.ico" />
    <meta property="og:title" content="QR GEN" />
    <meta
      property="og:description"
      content="Generador gratuito de Código QR para URLs"
    />
    <meta property="og:image" content="./og.webp" />
    <meta property="og:url" content="https://qr.edualex.uy/" />
    <meta property="og:site_name" content="QR GEN" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="QR GEN" />
    <meta
      name="twitter:description"
      content="Generador gratuito de Código QR para URLs"
    />
    <meta name="twitter:image" content="./og.webp" />
    <link rel="stylesheet" href="index.css" />
    <script src="index.js" type="module"></script>
    <title>Generador de QR | QR GEN</title>
    <style></style>
  </head>
  <body>
    <main>
      <section class="content">
        <header class="column">
          <h1><span style="color: #007bff">QR</span> GEN</h1>
          <p>Genera QR desde url o texto</p>
        </header>
        <div class="column">
          <form id="qrForm">
            <input
              type="text"
              id="textInput"
              placeholder="Ingresa una URL o texto"
              autofocus
              maxlength="80"
              required
            />
            <button type="button" id="toggleColorInputs">Más opciones</button>
            <div
              id="colorInputs"
              style="
                display: none;
                flex-direction: column;
                gap: 10px;
                margin-bottom: 10px;
              "
            >
              <input
                type="number"
                id="sizeInput"
                placeholder="Tamaño del QR (150~1000px)"
                min="150"
                max="1000"
              />
              <label for="color">Color del QR y del Fondo:</label>
              <div style="display: flex; gap: 10px">
                <input
                  type="color"
                  id="color"
                  name="color"
                  value="#000000"
                  style="width: 200px"
                />
                <input
                  type="color"
                  id="backgroundColor"
                  name="backgroundColor"
                  value="#ffffff"
                  style="width: 200px"
                />
              </div>
            </div>
            <button class="submit-button" type="submit">Generar QR</button>
          </form>
          <output id="result">
            <img id="qrCode" alt="" />
            <a
              id="downloadBtn"
              style="display: none"
              download="codigoQREduAlex.png"
            >
              <button class="button-for-download">Descargar QR</button>
            </a>
          </output>
        </div>
      </section>
    </main>
    <footer>
      EduAlex - Potenciado por
      <a href="https://www.npmjs.com/package/qrcode">QRCode</a>
    </footer>
  </body>
</html>
