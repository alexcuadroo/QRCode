<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="EduAlex" />
    <meta
      name="description"
      content="Generador gratuito de Código QR para URLs"
    />
    <meta
      name="keywords"
      content="generador de código qr, generador de qr, generador de qrcode, generador de código, generador de qrcode, generador de url, url, qrcode, qr, código qr, código qrcode"
    />
    <meta name="robots" content="index, follow" />
    <link rel="icon" href="favicon.ico" />
    <meta property="og:title" content="QR GEN" />
    <meta
      property="og:description"
      content="Generador gratuito de Código QR para URLs"
    />
    <meta property="og:image" content="./og.webp" />
    <meta property="og:url" content="https://qr.edualex.uy/" />
    <meta property="og:site_name" content="QR GEN" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="QR GEN" />
    <meta
      name="twitter:description"
      content="Generador gratuito de Código QR para URLs"
    />
    <meta name="twitter:image" content="./og.webp" />
    <link rel="stylesheet" href="index.css" />
    <script src="index.js" type="module"></script>
    <title>Generador de QR | QR GEN</title>
    <style></style>
  </head>
  <body>
    <main>
      <section class="content">
        <header class="column">
          <div class="logo-wrapper">
            <h1><span class="qr-text">QR</span><span class="gen-text">GEN</span></h1>
            <div class="subtitle-wrapper">
              <p class="subtitle">Crea códigos QR únicos al instante</p>
            </div>
          </div>
        </header>
        <div class="column">
          <form id="qrForm" class="glass-card">
            <div class="input-wrapper">
              <input
                type="text"
                id="textInput"
                placeholder="Ingresa una URL o texto mágico..."
                autofocus
                maxlength="80"
                required
              />
            </div>
            <button type="button" id="toggleColorInputs" class="toggle-btn">⚙️ Opciones avanzadas</button>
            <div id="colorInputs">
              <input
                type="number"
                id="sizeInput"
                placeholder="Tamaño del QR (150~1000px)"
                min="150"
                max="1000"
              />
              <label for="color">Color del QR y del Fondo:</label>
              <div class="color-pickers-wrapper">
                <input
                  type="color"
                  id="color"
                  name="color"
                  value="#000000"
                />
                <input
                  type="color"
                  id="backgroundColor"
                  name="backgroundColor"
                  value="#ffffff"
                />
              </div>
            </div>
            <button class="submit-button" type="submit">
              <span>Generar QR</span>
            </button>
          </form>
          <output id="result">
            <img id="qrCode" alt="" />
            <a
              id="downloadBtn"
              download="codigoQREduAlex.png"
            >
              <button class="button-for-download">Descargar QR</button>
            </a>
          </output>
        </div>
      </section>
    </main>
    <footer>
      EduAlex - Potenciado por
      <a
        href="https://www.npmjs.com/package/qrcode"
        target="_blank"
        rel="noopener noreferrer"
        >QRCode</a
      >
    </footer>
  </body>
</html>
